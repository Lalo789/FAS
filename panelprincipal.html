<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente | Restaurante FAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
<header class="brand-bg text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-orange-500 p-1 rounded-lg">🍴</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Restaurante FAS</h1>
                <p class="text-xs opacity-80">Panel de Cliente</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-medium">Hola, Roberto Díaz</span>
            <a href="historial.html" class="w-10 h-10 bg-orange-700 rounded-full flex items-center justify-center border-2 border-orange-500 hover:scale-105 transition">
                <span class="font-bold">R</span>
            </a>
        </div>
    </div>
    <div class="bg-white text-slate-600">
        <div class="max-w-7xl mx-auto px-4 flex gap-8 text-sm font-medium">
            <a href="panelprincipal.html" class="py-3 border-b-2 border-orange-700 text-orange-700">🏠 Inicio</a>
            <a href="historial.html" class="py-3 border-b-2 border-transparent hover:border-slate-300">📅 Mis Reservas</a>
        </div>
    </div>
</header>
<main class="max-w-7xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Bienvenido de nuevo</h2>
    <p class="text-slate-500 mb-8">¿Qué se te antoja para hoy?</p>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-600 flex justify-between items-center">
            <div><p class="text-slate-500 text-sm uppercase">Próxima Cita</p><h3 class="text-2xl font-bold">Mañana</h3></div>
            <div class="bg-orange-50 p-3 rounded-full text-orange-600">📅</div>
        </div>
    </div>
    <div class="lg:col-span-2 space-y-6">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-8">
            <div class="flex-1">
                <h3 class="text-3xl font-extrabold text-slate-800 mb-4">¿Vienes con nosotros?</h3>
                <a href="selectormesas.html" class="inline-block bg-orange-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-orange-800 transition transform hover:-translate-y-1">
                    Nueva Reservación 🚀
                </a>
            </div>
            <div class="w-48 h-48 bg-orange-100 rounded-2xl flex items-center justify-center text-8xl">🥩</div>
        </div>
        <a href="menuprincipal.html" class="block bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition group">
            <div class="flex flex-col md:flex-row items-center gap-6 p-6">
                <div class="w-full md:w-40 h-32 bg-slate-200 rounded-xl"></div>
                <div class="flex-1"><h3 class="text-xl font-bold">Explorar Menú</h3><p class="text-slate-500">Descubre nuestros platillos</p></div>
                <div class="bg-orange-100 text-orange-600 w-12 h-12 flex items-center justify-center rounded-xl font-bold">→</div>
            </div>
        </a>
    </div>
</main>
</body>
</html>
