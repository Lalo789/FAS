<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Mesa | FAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body class="antialiased text-slate-900">
    <header class="brand-bg text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-orange-500 p-1 rounded-lg">🍴</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Restaurante FAS</h1>
                <p class="text-xs opacity-80">Panel de Cliente</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-medium">Hola, Roberto Díaz</span>
            <a href="historial.html" class="w-10 h-10 bg-orange-700 rounded-full flex items-center justify-center border-2 border-orange-500 hover:scale-105 transition">
                <span class="font-bold">R</span>
            </a>
        </div>
    </div>
    <div class="bg-white text-slate-600">
        <div class="max-w-7xl mx-auto px-4 flex gap-8 text-sm font-medium">
            <a href="panelprincipal.html" class="py-3 border-b-2 border-orange-700 text-orange-700">🏠 Inicio</a>
            <a href="historial.html" class="py-3 border-b-2 border-transparent hover:border-slate-300">📅 Mis Reservas</a>
        </div>
    </div>
</header>
    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-extrabold mb-8">Mapa del Restaurante</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                        <button class="mesa-btn bg-white border-2 border-emerald-500 rounded-2xl p-6 flex flex-col items-center gap-2 hover:shadow-lg transition">
                            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">Libre</span>
                            <span class="mesa-id text-3xl font-black text-slate-700">M1</span>
                        </button>
                        </div>
                </div>
            </div>
            <aside class="w-full lg:w-96">
                <div class="bg-slate-900 text-white rounded-3xl p-8 shadow-xl sticky top-24">
                    <h3 class="text-xl font-bold mb-6 text-orange-400">Resumen</h3>
                    <a href="procesoreservacion.html" class="block text-center w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition transform active:scale-95">
                        Confirmar Reservación
                    </a>
                    <a href="panelprincipal.html" class="block text-center w-full mt-4 py-2 text-slate-400 text-sm hover:text-white transition">
                        Cancelar y salir
                    </a>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
