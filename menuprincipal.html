<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FAS Restaurant - Reservar Mesa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="empleado-body"> <header class="header-empleado">
        <div class="header-left">
            <button id="toggleSidebar" class="menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <span class="header-project-name">FAS System</span>
        </div>
        
        <div class="header-right-actions">
            <button class="header-btn" onclick="window.location.href='perfil.html'" title="Mi Perfil">
                <i class="fas fa-user-circle"></i>
                <span>Mi Cuenta</span>
            </button>
            <div class="header-divider"></div>
            <button class="header-btn logout" onclick="cerrarSesion()" title="Cerrar Sesión">
                <i class="fas fa-sign-out-alt"></i>
                <span>Salir</span>
            </button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1>🍽️ FAS Restaurant</h1>
                <p>Área de Clientes</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="cliente_reserva.html" class="nav-link active">
                        <i class="fas fa-calendar-plus"></i> <span class="nav-text">Reservar</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="historial.html" class="nav-link">
                        <i class="fas fa-history"></i> <span class="nav-text">Mis Reservas</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h2>Reserva tu Experiencia</h2>
                    <p>Selecciona una mesa y planifica tu visita</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Mesa</div>
                    <div id="resumenMesa" class="stat-number">---</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Zona / Capacidad</div>
                    <div id="resumenDetalles" class="stat-number" style="font-size: 1.1rem; margin-top: 1.4rem;">---</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Fecha y Hora</div>
                    <div id="resumenFecha" class="stat-number" style="font-size: 1.1rem; margin-top: 1.4rem;">---</div>
                </div>
            </div>

            <div class="data-section">
                <div class="section-header">
                    <h3>1. Configura tu visita</h3>
                </div>
                <div style="display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap;">
                    <div class="input-group" style="flex: 1;">
                        <label>Selecciona el día</label>
                        <input type="date" id="inputFecha" class="input-field" style="border: 1px solid #F7B91A;">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Selecciona la hora</label>
                        <input type="time" id="inputHora" class="input-field" style="border: 1px solid #F7B91A;">
                    </div>
                </div>

                <div class="section-header">
                    <h3>2. Selecciona tu mesa favorita</h3>
                </div>
                <p style="color: #737F03; font-size: 0.9rem; margin-bottom: 1.5rem;">Las mesas marcadas en rojo no están disponibles.</p>
                
                <div class="tables-grid" id="contenedorMesas">
                    </div>

                <div style="margin-top: 3rem; text-align: center;">
                    <button class="btn-login" style="width: auto; padding: 1rem 4rem; font-size: 1.1rem;" onclick="confirmarReserva()">
                        Confirmar y Generar Ticket
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
