<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital | FAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body class="antialiased menu-body">
    <header class="brand-bg text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-orange-500 p-1 rounded-lg">🍴</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Restaurante FAS</h1>
                <p class="text-xs opacity-80">Panel de Cliente</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-medium">Hola, Roberto Díaz</span>
            <a href="historial.html" class="w-10 h-10 bg-orange-700 rounded-full flex items-center justify-center border-2 border-orange-500 hover:scale-105 transition">
                <span class="font-bold">R</span>
            </a>
        </div>
    </div>
    <div class="bg-white text-slate-600">
        <div class="max-w-7xl mx-auto px-4 flex gap-8 text-sm font-medium">
            <a href="panelprincipal.html" class="py-3 border-b-2 border-orange-700 text-orange-700">🏠 Inicio</a>
            <a href="historial.html" class="py-3 border-b-2 border-transparent hover:border-slate-300">📅 Mis Reservas</a>
        </div>
    </div>
</header>
    <main class="max-w-7xl mx-auto px-6 py-10">
        <h2 class="text-3xl font-extrabold text-slate-900 mb-10">Nuestra Carta</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden food-card transition">
                <div class="h-56 bg-slate-200"></div>
                <div class="p-6">
                    <h3 class="text-lg font-bold">FAS Burger Deluxe</h3>
                    <p class="text-slate-500 text-xs mb-6">Doble carne angus y pan brioche.</p>
                    <button class="w-full py-3 border-2 border-slate-100 rounded-xl text-sm font-bold hover:bg-orange-600 hover:text-white transition">Ver Detalles</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
