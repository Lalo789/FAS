{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAS Admin - {% block title %}Admin{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'admin_panel/css/styles.css' %}">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">FAS Admin</div>
            <nav class="nav-menu">
                <a href="{% url 'dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{% url 'empleados' %}" class="nav-item {% if request.resolver_match.url_name == 'empleados' %}active{% endif %}">Empleados</a>
                <a href="{% url 'mesas' %}" class="nav-item {% if request.resolver_match.url_name == 'mesas' %}active{% endif %}">Mesas</a>
                <a href="{% url 'reservaciones' %}" class="nav-item {% if request.resolver_match.url_name == 'reservaciones' %}active{% endif %}">Reservaciones</a>
                <a href="{% url 'inventario' %}" class="nav-item {% if request.resolver_match.url_name == 'inventario' %}active{% endif %}">Inventario</a>
                <a href="{% url 'reportes' %}" class="nav-item {% if request.resolver_match.url_name == 'reportes' %}active{% endif %}">Reportes</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <div class="header-logo"></div>
                    <div class="brand-info">
                        <h1>Restaurante FAS</h1>
                        <span>Admin</span>
                    </div>
                </div>
              <div class="header-right">
    <div class="header-date">
        <span id="current-date"></span>
    </div>
    
    <div class="user-menu-container">
        <div class="user-profile" id="userMenuToggle">
            Admin Eduardo <span class="arrow">▾</span>
        </div>
        <div class="user-dropdown" id="userDropdown">
            <a href="#!"><span class="icon">👤</span> Mi Perfil</a>
            <hr>
            <a href="{% url 'dashboard' %}" class="logout-link"><span class="icon">🚪</span> Cerrar Sesión</a>
        </div>
    </div>
</div>
            </header>

            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>  

    <script src="{% static 'admin_panel/js/main.js' %}"></script>
</body>
</html>
