{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2>{% if mesa %}Editar Mesa {{ mesa.numero }}{% else %}Agregar Nueva Mesa{% endif %}</h2>
            <a href="{% url 'mesas' %}" class="btn-cancel">✕</a>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid-single">
                <div class="input-group">
                    <label>Identificador (Ej. M11)</label>
                    <input type="text" name="numero" value="{{ mesa.numero }}" required>
                </div>
                <div class="input-group">
                    <label>Capacidad de Personas</label>
                    <input type="number" name="capacidad" value="{{ mesa.capacidad }}" min="1">
                </div>
                <div class="input-group">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="Disponible" {% if mesa.estado == 'Disponible' %}selected{% endif %}>Disponible</option>
                        <option value="Ocupada" {% if mesa.estado == 'Ocupada' %}selected{% endif %}>Ocupada</option>
                        <option value="Mantenimiento" {% if mesa.estado == 'Mantenimiento' %}selected{% endif %}>Mantenimiento</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                {% if mesa %}Actualizar Mesa{% else %}Registrar Mesa{% endif %}
            </button>
        </form>
    </div>
</div>

<style>
    .form-container { display: flex; justify-content: center; padding: 20px; }
    .form-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #eee; }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .btn-cancel { text-decoration: none; color: #999; font-size: 1.2rem; }
    .form-grid-single { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.85rem; color: #555; text-transform: uppercase; }
    .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .btn-submit { width: 100%; padding: 15px; background: #8B1A1A; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
</style>
{% endblock %}
