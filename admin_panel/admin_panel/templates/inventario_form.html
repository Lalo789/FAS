{% extends 'base.html' %}

{% block title %}{% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2 class="page-title">
                {% if producto %}Editar: {{ producto.nombre }}{% else %}Agregar Nuevo Producto{% endif %}
            </h2>
            <a href="{% url 'inventario' %}" class="btn-back">✕ Cancelar</a>
        </div>

        <form method="POST" class="main-form">
            {% csrf_token %}
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nombre del Producto</label>
                    <input type="text" name="nombre" value="{{ producto.nombre }}" placeholder="Ej. Queso Mozzarella" required>
                </div>

                <div class="form-group">
                    <label>Categoría</label>
                    <select name="categoria">
                        <option value="Lácteos" {% if producto.categoria == 'Lácteos' %}selected{% endif %}>Lácteos</option>
                        <option value="Carnes" {% if producto.categoria == 'Carnes' %}selected{% endif %}>Carnes</option>
                        <option value="Bebidas" {% if producto.categoria == 'Bebidas' %}selected{% endif %}>Bebidas</option>
                        <option value="Verduras" {% if producto.categoria == 'Verduras' %}selected{% endif %}>Verduras</option>
                        <option value="Abarrotes" {% if producto.categoria == 'Abarrotes' %}selected{% endif %}>Abarrotes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Unidad de Medida</label>
                    <select name="unidad">
                        <option value="Kg" {% if producto.unidad == 'Kg' %}selected{% endif %}>Kilogramos (Kg)</option>
                        <option value="Pzas" {% if producto.unidad == 'Pzas' %}selected{% endif %}>Piezas (Pzas)</option>
                        <option value="Lts" {% if producto.unidad == 'Lts' %}selected{% endif %}>Litros (Lts)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Cantidad en Stock</label>
                    <input type="number" step="0.1" name="cantidad" value="{{ producto.cantidad }}" placeholder="0.0" required>
                </div>

                <div class="form-group">
                    <label>Precio Unitario ($)</label>
                    <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" placeholder="0.00" required>
                </div>

                <div class="form-group full-width">
                    <label>Notas / Descripción</label>
                    <textarea name="notas" rows="3" placeholder="Proveedor, marca o ubicación en almacén...">{{ producto.notas }}</textarea>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-save">
                    {% if producto %}Guardar Cambios{% else %}Registrar Producto{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container { display: flex; justify-content: center; padding: 20px; animation: slideUp 0.3s ease-out; }
    .form-card { background: white; width: 100%; max-width: 700px; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
    
    .form-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8f9fa; margin-bottom: 25px; padding-bottom: 15px; }
    .btn-back { text-decoration: none; color: #999; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
    .btn-back:hover { color: #8B1A1A; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.8rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .form-group input, .form-group select, .form-group textarea { 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        font-size: 1rem; 
        outline: none; 
        font-family: inherit;
    }
    
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #8B1A1A; box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.1); }

    .form-footer { margin-top: 30px; display: flex; justify-content: flex-end; }
    .btn-save { background-color: #8B1A1A; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(139, 26, 26, 0.2); }
    .btn-save:hover { background-color: #6d1414; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(139, 26, 26, 0.3); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
