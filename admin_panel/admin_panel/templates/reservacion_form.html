{% extends 'base.html' %}

{% block title %}{% if reservacion %}Editar Reserva{% else %}Nueva Reservación{% endif %}{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2 class="page-title">
                {% if reservacion %}Editar Reserva: {{ reservacion.cliente }}{% else %}Nueva Reservación{% endif %}
            </h2>
            <a href="{% url 'reservaciones' %}" class="btn-back">✕ Cancelar</a>
        </div>

        <form method="POST" class="main-form">
            {% csrf_token %}
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nombre del Cliente</label>
                    <input type="text" name="cliente" value="{{ reservacion.cliente }}" placeholder="Ej. Luis Hernández" required>
                </div>

                <div class="form-group">
                    <label>Mesa Asignada</label>
                    <select name="mesa">
                        <option value="M1" {% if reservacion.mesa == 'M1' %}selected{% endif %}>Mesa 1 (4 personas)</option>
                        <option value="M2" {% if reservacion.mesa == 'M2' %}selected{% endif %}>Mesa 2 (2 personas)</option>
                        <option value="M4" {% if reservacion.mesa == 'M4' %}selected{% endif %}>Mesa 4 (4 personas)</option>
                        <option value="M10" {% if reservacion.mesa == 'M10' %}selected{% endif %}>Mesa 10 (6 personas)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de Personas</label>
                    <input type="number" name="personas" value="{{ reservacion.personas }}" min="1" max="20" placeholder="4">
                </div>

                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" name="fecha" value="{{ reservacion.fecha|date:'Y-m-d' }}" required>
                </div>

                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" name="hora" value="{{ reservacion.hora }}" required>
                </div>

                <div class="form-group full-width">
                    <label>Estado de la Reserva</label>
                    <select name="estado">
                        <option value="Pendiente" {% if reservacion.estado == 'Pendiente' %}selected{% endif %}>⏳ Pendiente</option>
                        <option value="Confirmada" {% if reservacion.estado == 'Confirmada' %}selected{% endif %}>✅ Confirmada</option>
                        <option value="Cancelada" {% if reservacion.estado == 'Cancelada' %}selected{% endif %}>🚫 Cancelada</option>
                    </select>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-save">
                    {% if reservacion %}Actualizar Reservación{% else %}Confirmar Reserva{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container { display: flex; justify-content: center; padding: 20px; animation: slideUp 0.3s ease-out; }
    .form-card { background: white; width: 100%; max-width: 700px; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
    .form-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8f9fa; margin-bottom: 25px; padding-bottom: 15px; }
    .btn-back { text-decoration: none; color: #999; font-weight: bold; font-size: 0.9rem; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.8rem; font-weight: 700; color: #555; text-transform: uppercase; }
    .form-group input, .form-group select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
    .form-group input:focus { border-color: #8B1A1A; }

    .form-footer { margin-top: 30px; display: flex; justify-content: flex-end; }
    .btn-save { background-color: #8B1A1A; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-save:hover { background-color: #6d1414; transform: translateY(-2px); }

    

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
