{% extends 'base.html' %}

{% block title %}Formulario de Empleado{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2 class="page-title">
                {% if empleado %}Editar Empleado: {{ empleado.nombre }}{% else %}Agregar Nuevo Empleado{% endif %}
            </h2>
            <a href="{% url 'empleados' %}" class="btn-back">✕ Cancelar</a>
        </div>

        <form method="POST" class="main-form">
            {% csrf_token %}
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label>Puesto</label>
                    <select name="puesto">
                        <option>Mesero</option>
                        <option>Cocinero</option>
                        <option>Cajero</option>
                        <option>Gerente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Turno</label>
                    <select name="turno">
                        <option>Mañana</option>
                        <option>Tarde</option>
                        <option>Noche</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Horario</label>
                    <input type="text" name="horario" placeholder="09:00 - 16:00">
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-save">
                    {% if empleado %}Actualizar Datos{% else %}Guardar Empleado{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container {
        display: flex;
        justify-content: center;
        padding-top: 20px;
        animation: slideUp 0.3s ease-out;
    }

    .form-card {
        background: white;
        width: 100%;
        max-width: 800px;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        border: 1px solid #eee;
    }

    .form-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #f8f9fa;
        margin-bottom: 25px;
        padding-bottom: 15px;
    }

    .btn-back {
        text-decoration: none;
        color: #999;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
    }

    .btn-back:hover { color: #666; }

    /* Estructura del Formulario */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
    }

    .form-group input, .form-group select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        border-color: #8B1A1A;
    }

    /* Footer y Botón */
    .form-footer {
        margin-top: 40px;
        display: flex;
        justify-content: flex-end;
    }

    .btn-save {
        background-color: #8B1A1A;
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        box-shadow: 0 4px 10px rgba(139, 26, 26, 0.2);
        transition: 0.3s;
    }

    .btn-save:hover {
        background-color: #6d1414;
        transform: translateY(-2px);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
