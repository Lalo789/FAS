<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | FAS</title>

    <!-- IMPORTANTE -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="brand-bg" style="color:white; padding:15px;">
    <h1>🍴 Restaurante FAS</h1>
    <p>Panel de Cliente</p>
</header>

<nav class="brand-bg-alt" style="padding:10px;">
    <a href="#" style="color:white;">Inicio</a> |
    <a href="#" style="color:white;">Mis Reservas</a>
</nav>

<main style="padding:20px; max-width:900px; margin:auto;">

    <!-- PERFIL -->
    <section>
        <h2>Perfil</h2>
        <p>Nombre: Roberto Díaz</p>
        <p>Cliente desde: 2025</p>
    </section>

    <br>

    <!-- EDITAR DATOS -->
    <section>
        <h2>Editar Datos</h2>

        <form>
            <label>Nombre:</label>
            <input type="text" value="Roberto Díaz">

            <label>Correo:</label>
            <input type="email" value="roberto@email.com">

            <label>Teléfono:</label>
            <input type="text" value="4431234567">

            <br><br>
            <button type="submit">Guardar Cambios</button>
        </form>
    </section>

    <br>

    <!-- PREFERENCIAS -->
    <section>
        <h2>Preferencias</h2>

        <form>

            <label>Tipo de comida favorita:</label>
            <select>
                <option>Mexicana</option>
                <option>Italiana</option>
                <option>Vegetariana</option>
                <option>Rápida</option>
            </select>

            <br><br>

            <label>Restricciones:</label><br>
            <input type="checkbox"> Sin gluten<br>
            <input type="checkbox"> Vegano<br>
            <input type="checkbox"> Sin lactosa<br>

            <br>

            <label>Preferencia de mesa:</label><br>
            <input type="radio" name="mesa"> Terraza<br>
            <input type="radio" name="mesa"> Interior<br>

            <br>

            <label>Notas:</label>
            <textarea rows="3"></textarea>

            <br><br>
            <button type="submit">Guardar Preferencias</button>

        </form>
    </section>

    <br>

    <!-- HISTORIAL -->
    <section>
        <h2>Historial de Visitas</h2>

        <table border="1" width="100%">
            <tr>
                <th>Fecha</th>
                <th>Mesa</th>
                <th>Estado</th>
            </tr>
            <tr>
                <td>12/02/2026</td>
                <td>Mesa M5</td>
                <td><strong style="color:green;">Finalizada</strong></td>
            </tr>
        </table>
    </section>

</main>

</body>
</html>
