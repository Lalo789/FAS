<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FAS Restaurant · Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
<div class="auth-container">
  
  <div id="loginCard" class="auth-card">
    <h1 class="fas-restaurant-title"><i class="fas fa-utensils"></i> FAS Restaurant</h1>
    <div class="welcome-text">Bienvenido de nuevo</div>
    <div class="input-group">
      <label>Correo Electrónico</label>
      <input class="input-field" type="email" placeholder="tu@email.com">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input class="input-field" type="password" placeholder="*********">
    </div>
    <div class="flex-row">
      <label class="checkbox-label"><input type="checkbox"> Recordarme</label>
      <a href="#" class="link-forgot" id="goToRecoverLink">¿Olvidaste tu contraseña?</a>
    </div>
    <button class="btn-login" id="loginBtn">Iniciar Sesión</button>
    <div class="divider"><span>O continuar con:</span></div>
    <div class="social-buttons">
      <button class="social-btn" id="googleLoginBtn"><i class="fab fa-google" style="color:#640E09;"></i> Google</button>
      <button class="social-btn" id="facebookLoginBtn"><i class="fab fa-facebook-f" style="color:#640E09;"></i> Facebook</button>
    </div>
    <div class="footer-text">
      ¿No tienes una cuenta? <a href="#" id="goToRegisterLink">Regístrate aquí</a>
    </div>
  </div>

  <div id="recoverCard" class="auth-card hidden">
    <a href="#" class="back-link" id="backToLoginFromRecover"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
    <h2 class="title-page">Recuperar Contraseña</h2>
    <div class="subhead">Ingresa tu correo para restablecer tu contraseña</div>
    <div class="input-group">
      <label>Correo Electrónico</label>
      <input class="input-field" type="email" placeholder="tu@email.com">
    </div>
    <button class="btn-login" id="sendRecoveryBtn">Enviar enlace de recuperación</button>
  </div>

  <div id="registerCard" class="auth-card hidden">
    <h1 class="fas-restaurant-title" style="font-size: 2rem;">Crear Cuenta</h1>
    <div class="welcome-text" style="margin-bottom: 1.8rem;">Únete a FAS Restaurant</div>
    <div class="input-group">
      <label>Nombre Completo</label>
      <input class="input-field" type="text" placeholder="Juan Pérez">
    </div>
    <div class="input-group">
      <label>Correo Electrónico</label>
      <input class="input-field" type="email" placeholder="tu@email.com">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input class="input-field" type="password" placeholder="*********">
    </div>
    <div class="terms-check">
      <input type="checkbox" id="termsCheck">
      <label for="termsCheck">Acepto los términos y condiciones</label>
    </div>
    <button class="btn-login" id="createAccountBtn">Crear Cuenta</button>
    <div class="footer-text" style="margin-top: 0.5rem;">
      ¿Ya tienes una cuenta? <a href="#" id="goToLoginFromRegister">Inicia sesión aquí</a>
    </div>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
