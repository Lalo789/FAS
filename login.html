<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FAS Restaurant · Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  
  <div class="auth-container">
    
    <div class="auth-card login-card">
      <h1 class="fas-restaurant-title"><i class="fas fa-utensils"></i> FAS Restaurant</h1>
      <div class="welcome-text"></div>
      
      <form id="customerLoginForm">
        <div class="input-group">
          <label>Correo Electrónico</label>
          <input class="input-field" type="email" placeholder="tu@email.com" required>
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <input class="input-field" type="password" placeholder="*********" required>
        </div>
        <div class="flex-row">
          <label class="checkbox-label"><input type="checkbox"> Recordarme</label>
          <a href="#" class="link-forgot" id="openRecoverModal">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn-login" id="customerLoginBtn">Iniciar Sesión</button>
      </form>

      <div class="divider"><span>O ingresar con</span></div>
      <div class="social-buttons">
        <button class="social-btn"><i class="fab fa-google" style="color:#640E09;"></i> Google</button>
        <button class="social-btn"><i class="fab fa-facebook-f" style="color:#640E09;"></i> Facebook</button>
      </div>
    </div>

  </div> 

  <button id="openRegisterModal" class="floating-btn">
    <i class="fas fa-user-plus"></i> Crear Cuenta
  </button>

  <div id="registerModal" class="modal-overlay hidden">
    <div class="modal-auth-card">
      <button class="close-modal-btn" id="closeRegisterModal"><i class="fas fa-times"></i></button>
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <i class="fas fa-user-circle" style="font-size: 3rem; color: #EB6C0C; margin-bottom: 0.5rem;"></i>
        <h2 style="color: #640E09;">Únete a FAS</h2>
      </div>
      
      <form id="customerRegisterForm">
        
        <div class="input-group">
          <label>Nombre(s)</label>
          <input class="input-field" type="text" placeholder="Ej. Carlos" required>
        </div>

        <div style="display: flex; gap: 1rem;">
          <div class="input-group" style="flex: 1;">
            <label>Apellido Paterno</label>
            <input class="input-field" type="text" placeholder="Ej. López" required>
          </div>
          <div class="input-group" style="flex: 1;">
            <label>Apellido Materno</label>
            <input class="input-field" type="text" placeholder="Ej. García" required>
          </div>
        </div>

        <div class="input-group">
          <label>Correo Electrónico</label>
          <input class="input-field" type="email" placeholder="tu@email.com" required>
        </div>

        <div class="input-group">
          <label>Número de Teléfono</label>
          <input class="input-field" type="tel" placeholder="Ej. 4431234567" pattern="[0-9]{10}" title="Debe contener 10 dígitos numéricos" required>
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input class="input-field" type="password" placeholder="*********" required>
        </div>

        <div class="terms-check">
          <input type="checkbox" id="termsCheck" required>
          <label for="termsCheck">Acepto los términos y condiciones</label>
        </div>
        
        <button type="submit" class="btn-login" style="background: linear-gradient(135deg, #EB6C0C, #F7B91A); border:none; color:#640E09; margin-top: 1rem;">Crear Mi Cuenta</button>
      </form>

    </div>
  </div>

  <div id="recoverModal" class="modal-overlay hidden">
    <div class="modal-auth-card">
      <button class="close-modal-btn" id="closeRecoverModal"><i class="fas fa-times"></i></button>
      <h2 class="title-page" style="font-size: 1.6rem; color:#465652;">Recuperar Contraseña</h2>
      <div class="subhead" style="margin-bottom: 1.5rem; color:#465652;">Ingresa tu correo para restablecer tu acceso</div>
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input class="input-field" type="email" placeholder="tu@email.com">
      </div>
      <button class="btn-login" id="sendRecoveryBtn" style="background: #465652;">Enviar enlace</button>
    </div>
  </div>

<script src="main.js"></script>
</body>
</html>
