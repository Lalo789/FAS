<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAS Restaurant - Bienvenidos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-body">
    <!-- Header Fijo (Mismo que el de Empleado) -->
    <header class="header-empleado">
        <div class="header-left" style="display: flex; align-items: center;">
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <span class="header-project-name">FAS RESTAURANT</span>
        </div>
        <div class="header-right">
            <div class="header-right-actions">
                <a href="login.html" class="header-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>ACCEDER</span>
                </a>
            </div>
        </div>
    </header>

    <main class="landing-main">
        <!-- SECCIÓN 1: HERO (Imagen Completa + Logo) -->
        <section class="hero-full">
            <div class="hero-content">
                <div class="hero-logo-large">
                    <i class="fas fa-utensils"></i>
                    <h1>FAS</h1>
                    <p>RESTAURANT</p>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 2: FRASE Y LINK (Fondo Sólido Verde) -->
        <section class="phrase-banner">
            <div class="phrase-container">
                <h2 class="main-phrase">"SABORES QUE DESPIERTAN TUS SENTIDOS."</h2>
                <a href="#" class="text-link-menu">DESCUBRE NUESTRO MENÚ</a>
            </div>
        </section>

        <!-- SECCIÓN 3: COLLAGE MODULAR (Sin Espacios) -->
        <section class="collage-modular">
            <div class="collage-grid-full">
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg" alt="Platillo 1"></div>
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg" alt="Platillo 2"></div>
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg" alt="Platillo 3"></div>
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/67468/pexels-photo-67468.jpeg" alt="Platillo 4"></div>
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/376464/pexels-photo-376464.jpeg" alt="Platillo 5"></div>
                <div class="collage-img-item"><img src="https://images.pexels.com/photos/958545/pexels-photo-958545.jpeg" alt="Platillo 6"></div>
            </div>
        </section>

        <!-- SECCIÓN 4: RESEÑAS (Estilo Decorativo) -->
        <section class="reviews-section">
            <div class="review-card-decorated">
                <span class="corner-top"></span>
                <h3 class="section-subtitle">RESEÑAS</h3>
                <p class="review-text">"UNA EXPERIENCIA INOLVIDABLE, LA CALIDAD DE LOS CORTES Y EL AMBIENTE SON EXCEPCIONALES."</p>
                <div class="social-icons-footer">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="corner-bottom"></span>
            </div>
        </section>
    </main>
</body>
