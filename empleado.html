<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Restaurante FAS - Panel de Empleado</title>
    <link rel="stylesheet" href="styles.css">
</head>

<header class="header-empleado">
    <div class="header-left">
        <button id="toggleSidebar" class="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
        <span class="header-project-name">FAS System</span>
    </div>
    
    <div class="header-right-actions">
        <button class="header-btn" onclick="goToProfile()" title="Mi Perfil">
            <i class="fas fa-user-circle"></i>
            <span>Perfil</span>
        </button>
        <div class="header-divider"></div>
        <button class="header-btn logout" onclick="cerrarSesion()" title="Cerrar Sesión">
            <i class="fas fa-sign-out-alt"></i>
            <span>Salir</span>
        </button>
    </div>
</header>

<body class="empleado-body">
    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1>🍽️ Restaurante FAS</h1>
                <p>Empleado</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link active" data-page="mesas">🍽️ Mesas</a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-page="empleados">👥 Empleados</a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-page="clientes">📋 Clientes</a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-page="reservas">📅 Reservas</a></li>
            </ul>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:#640E09; margin-bottom: 1rem; font-size: 1.5rem;">Título</h3>
            <form id="modalForm">
                <div id="modalFields"></div>
                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn" style="border: 1px solid #640E09; color:#640E09;" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
